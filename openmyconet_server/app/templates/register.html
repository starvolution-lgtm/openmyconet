<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>OpenMycoNet — Registrierung</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 60px auto; color: #eee; background: #0a0f0a; }
        h1 { color: #4caf50; }
        input, select { width: 100%; padding: 8px; margin: 6px 0 16px 0; background: #1a2a1a; color: #eee; border: 1px solid #4caf50; border-radius: 4px; }
        button { background: #4caf50; color: #000; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .msg { color: #4caf50; margin-top: 16px; }
        .err { color: #f44336; margin-top: 16px; }
    </style>
</head>
<body>
    <h1>🍄 OpenMycoNet</h1>
    <h2>Registrierung</h2>

    {% if nachricht %}
        <p class="msg">{{ nachricht }}</p>
    {% endif %}
    {% if fehler %}
        <p class="err">{{ fehler }}</p>
    {% endif %}

    <form method="POST">
        <label>Name</label>
        <input type="text" name="name" required>

        <label>E-Mail</label>
        <input type="email" name="email" required>

        <label>Sprache</label>
        <select name="sprache">
            <option value="de">Deutsch</option>
            <option value="en">English</option>
            <option value="nl">Nederlands</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
        </select>

        <label>Land</label>
        <input type="text" name="land">

        <label>Gruppe</label>
        <select name="gruppe">
            <option value="allgemein">Allgemein / Interessiert</option>
            <option value="biocomm">BioComm Hardware-Nutzer</option>
            <option value="wissenschaft">Wissenschaft / Forschung</option>
            <option value="foerderer">Förderer / Sponsor</option>
        </select>

        <button type="submit">Registrieren</button>
    </form>
</body>
</html>
