<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>OpenMycoNet — News verwalten</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; color: #eee; background: #0a0f0a; padding: 0 20px; }
        h1, h2 { color: #4caf50; }
        label { display: block; margin-top: 16px; color: #aaa; font-size: 0.9em; }
        input, select, textarea { width: 100%; padding: 8px; margin: 6px 0; background: #1a2a1a; color: #eee; border: 1px solid #4caf50; border-radius: 4px; box-sizing: border-box; }
        textarea { height: 180px; resize: vertical; }
        button { background: #4caf50; color: #000; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 16px; }
        .msg { color: #4caf50; margin: 16px 0; padding: 10px; background: #1a2a1a; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1a2a1a; color: #4caf50; padding: 10px; text-align: left; }
        td { padding: 8px 10px; border-bottom: 1px solid #1a2a1a; font-size: 0.9em; }
        .del { color: #f44336; text-decoration: none; font-size: 0.85em; }
        nav { margin-bottom: 30px; }
        a { color: #4caf50; }
        hr { border-color: #1a2a1a; margin: 30px 0; }
    </style>
</head>
<body>
    <nav><a href="/admin">← Admin</a></nav>
    <h1>🍄 News verwalten</h1>

    {% if nachricht %}
        <p class="msg">{{ nachricht }}</p>
    {% endif %}

    <h2>Neuen Beitrag erstellen</h2>
    <form method="POST">
        <label>Titel</label>
        <input type="text" name="titel" required>

        <label>Sprache</label>
        <select name="sprache">
            <option value="de">Deutsch</option>
            <option value="en">English</option>
            <option value="nl">Nederlands</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
        </select>

        <label>Inhalt</label>
        <textarea name="inhalt" required></textarea>

        <button type="submit">Veröffentlichen</button>
    </form>

    <hr>
    <h2>Bestehende Beiträge</h2>
    <table>
        <tr>
            <th>Datum</th>
            <th>Sprache</th>
            <th>Titel</th>
            <th></th>
        </tr>
        {% for news in news_liste %}
        <tr>
            <td>{{ news.veroeffentlicht.strftime('%d.%m.%Y') }}</td>
            <td>{{ news.sprache }}</td>
            <td>{{ news.titel }}</td>
            <td><a href="/admin/news/delete/{{ news.id }}" class="del" onclick="return confirm('Wirklich löschen?')">✕</a></td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
