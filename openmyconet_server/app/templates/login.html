<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>OpenMycoNet — Admin Login</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 100px auto; color: #eee; background: #0a0f0a; padding: 0 20px; }
        h1 { color: #4caf50; }
        label { display: block; margin-top: 16px; color: #aaa; font-size: 0.9em; }
        input { width: 100%; padding: 8px; margin: 6px 0 16px 0; background: #1a2a1a; color: #eee; border: 1px solid #4caf50; border-radius: 4px; box-sizing: border-box; }
        button { background: #4caf50; color: #000; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .err { color: #f44336; margin-top: 16px; }
    </style>
</head>
<body>
    <h1>🍄 Admin Login</h1>

    {% if fehler %}
        <p class="err">{{ fehler }}</p>
    {% endif %}

    <form method="POST">
        <label>Benutzername</label>
        <input type="text" name="username" required autofocus>

        <label>Passwort</label>
        <input type="password" name="password" required>

        <button type="submit">Anmelden</button>
    </form>
</body>
</html>
